query BugDetail($ref: String, $prefix: String!) {
  repository(ref: $ref) {
    bug(prefix: $prefix) {
      id
      humanId
      status
      title
      labels {
        name
        color {
          R
          G
          B
        }
      }
      author {
        id
        humanId
        displayName
        avatarUrl
      }
      createdAt
      lastEdit
      participants(first: 20) {
        nodes {
          id
          humanId
          displayName
          avatarUrl
        }
      }
      timeline(first: 250) {
        nodes {
          __typename
          id
          ... on BugCreateTimelineItem {
            author {
              id
              humanId
              displayName
              avatarUrl
            }
            message
            createdAt
            lastEdit
            edited
          }
          ... on BugAddCommentTimelineItem {
            author {
              id
              humanId
              displayName
              avatarUrl
            }
            message
            createdAt
            lastEdit
            edited
          }
          ... on BugLabelChangeTimelineItem {
            author {
              humanId
              displayName
            }
            date
            added {
              name
              color {
                R
                G
                B
              }
            }
            removed {
              name
              color {
                R
                G
                B
              }
            }
          }
          ... on BugSetStatusTimelineItem {
            author {
              humanId
              displayName
            }
            date
            status
          }
          ... on BugSetTitleTimelineItem {
            author {
              humanId
              displayName
            }
            date
            title
            was
          }
        }
      }
    }
  }
}
